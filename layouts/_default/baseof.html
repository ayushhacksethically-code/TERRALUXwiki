<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else if .Summary }}{{ .Summary }}{{ else }}{{ .Site.Title }} - Cartographic Techniques and Thematic Mapping notes.{{ end }}">
  
  <!-- Stylesheet -->
  <link rel="stylesheet" href="{{ "css/styles.css" | relURL }}">
  
  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header class="navbar-container">
    <div class="navbar container">
      <a href="{{ site.Home.RelPermalink }}" class="logo">TERRALUX</a>
      <nav class="nav-links">
        <a href="{{ site.Home.RelPermalink }}" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
        <a href="https://github.com/ayushhacksethically-code" target="_blank" class="nav-link github-btn"><i class="fa-brands fa-github"></i> GitHub</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="footer">
    <div class="container text-center">
      <p>&copy; {{ now.Format "2006" }} <span class="logo-text">TERRALUX</span>. Cartographic Techniques & Thematic Mapping.</p>
      <p class="footer-subtext">Made using Hugo</p>
    </div>
  </footer>
</body>
</html>
