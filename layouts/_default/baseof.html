<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else if .Summary }}{{ .Summary }}{{ else }}{{ .Site.Title }} - Cartographic Techniques and Thematic Mapping notes.{{ end }}">
  
  <!-- Stylesheet -->
  <link rel="stylesheet" href="{{ "css/styles.css" | relURL }}">
  
  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header class="navbar-container">
    <div class="navbar container">
      <a href="{{ site.Home.RelPermalink }}" class="logo">TERRALUX</a>
      <nav class="nav-links">
        <a href="{{ site.Home.RelPermalink }}" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="footer">
    <div class="container text-center">
      <p>&copy; {{ now.Format "2006" }} <span class="logo-text">TERRALUX</span>. Cartographic Techniques & Thematic Mapping.</p>
      <p class="footer-subtext">Made using Hugo</p>
    </div>
  </footer>

  <!-- Mermaid JS for flowcharts -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // Convert Markdown code fences (pre code.language-mermaid) to div.mermaid
      const mermaidBlocks = document.querySelectorAll('pre code.language-mermaid');
      mermaidBlocks.forEach(function(codeEl) {
        const preEl = codeEl.parentElement;
        const divEl = document.createElement('div');
        divEl.className = 'mermaid';
        divEl.textContent = codeEl.textContent;
        preEl.replaceWith(divEl);
      });

      mermaid.initialize({
        startOnLoad: true,
        theme: 'default',
        securityLevel: 'loose',
        flowchart: { useMaxWidth: true, htmlLabels: true }
      });
    });
  </script>
</body>
</html>
