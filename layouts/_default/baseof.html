<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else if .Summary }}{{ .Summary }}{{ else }}{{ .Site.Title }} - Cartographic Techniques and Thematic Mapping notes.{{ end }}">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Stylesheet -->
  <link rel="stylesheet" href="{{ "css/styles.css" | relURL }}">
  
  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark text-light">
  <!-- Glowing decorative blobs -->
  <div class="glow-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <header class="navbar-container">
    <div class="navbar container">
      <a href="{{ "/" | relURL }}" class="logo">
        <span class="logo-glow">TERRALUX</span>
      </a>
      <nav class="nav-links">
        <a href="{{ "/" | relURL }}" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
        <a href="https://github.com/ayushhacksethically-code" target="_blank" class="nav-link github-btn"><i class="fa-brands fa-github"></i> GitHub</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="footer">
    <div class="container text-center">
      <p>&copy; {{ now.Format "2006" }} <span class="logo-text">TERRALUX</span>. Cartographic Techniques & Thematic Mapping.</p>
      <p class="footer-subtext">Made with <i class="fa-solid fa-heart text-danger"></i> using Hugo</p>
    </div>
  </footer>
</body>
</html>
